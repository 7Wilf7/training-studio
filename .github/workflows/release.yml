name: Release Android APK

# Fires when you push a tag like v0.2.0. Builds the web bundle, syncs into
# Capacitor's android/ project, signs the APK using credentials from Secrets,
# and uploads the APK to a GitHub Release named after the tag.
#
# To cut a release locally:
#   git tag v0.2.0
#   git push origin v0.2.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so auto-generated release notes see prior tags

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite bundle
        run: npm run build

      - name: Sync Capacitor → android/
        run: npx cap sync android

      - name: Decode keystore from Secret
        # ANDROID_KEYSTORE_BASE64 holds the .jks file base64-encoded.
        # We write it to RUNNER_TEMP (auto-cleaned) and expose the path
        # to gradle via env var (read by android/app/build.gradle).
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Derive versionName + versionCode from tag
        # versionName = tag without leading "v" (so v0.2.0 → 0.2.0)
        # versionCode = GitHub run number — guaranteed monotonic increase,
        # which is what Android requires for upgrades to work.
        run: |
          echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             "training-studio-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: training-studio-${{ github.ref_name }}.apk
          name: Training Studio ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Android APK for Training Studio ${{ github.ref_name }}.

            **Install**: download the APK below, open it on your phone, allow
            "install from unknown sources" when prompted.

            **Update**: if you already have an older signed version installed,
            this will replace it in place (no need to uninstall first).
