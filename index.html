<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- User-supplied app icon (512x512 JPG). One file covers desktop tab
         favicon, iOS add-to-home-screen, and the PWA manifest icon. -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="apple-touch-icon" href="/favicon.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Training Studio" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f1ec" />
    <title>Training Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- TEMP DEBUG: surface boot-time JS errors directly on screen. The
         release APK was white-screening with no way to see WebView console.
         Remove this block once we've identified the root cause. -->
    <script>
      (function () {
        function show(label, payload) {
          try {
            var root = document.getElementById('root') || document.body;
            root.innerHTML =
              '<pre style="margin:0;padding:14px;font:11px/1.4 monospace;color:#900;background:#fee;white-space:pre-wrap;overflow:auto;min-height:100vh">' +
              '[' + label + ']\n' + payload + '\n\n' +
              '--- env ---\n' +
              'UA: ' + navigator.userAgent + '\n' +
              'location: ' + window.location.href + '\n' +
              'Capacitor: ' + (typeof window.Capacitor) + '\n' +
              'isNative: ' + (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) +
              '</pre>';
          } catch (_) {}
        }
        window.addEventListener('error', function (e) {
          show('ERROR',
            (e.error && e.error.stack) || e.message + '\nat ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?'));
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          show('PROMISE REJECTION',
            (e.reason && (e.reason.stack || e.reason.message)) || String(e.reason));
        });
        // Heartbeat: if nothing rendered after 4s, dump env so we at least
        // see whether the bundle ran at all.
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) show('TIMEOUT (no render after 4s)', 'main.jsx may not have executed');
        }, 4000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
